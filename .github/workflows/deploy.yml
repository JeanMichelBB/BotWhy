name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "frontend-react/**"
      - "backend-api/**"
      - ".github/workflows/docker-build.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_PASSWORD }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build and push frontend image
        env:
          MY_SECRET: ${{ secrets.MY_SECRET }}
        run: |
          sed -i 's|http://localhost:8000|https://botwhyapi.sacenpapier.org|g' ./frontend-react/src/api.jsx
          docker buildx build --platform linux/arm64 -t jeanmichelbb/oci-frontend:latest ./frontend-react --push

      - name: Build and push backend image
        run: |
          docker buildx build --platform linux/arm64 -t jeanmichelbb/oci-backend:latest ./backend-api --push
