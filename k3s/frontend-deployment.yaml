apiVersion: apps/v1
kind: Deployment
metadata:
  name: botwhy-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: botwhy-frontend
  template:
    metadata:
      labels:
        app: botwhy-frontend
    spec:
      containers:
        - name: botwhy-frontend
          image: jeanmichelbb/oci-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: botwhy-frontend
spec:
  selector:
    app: botwhy-frontend
  ports:
    - port: 80
      targetPort: 80
