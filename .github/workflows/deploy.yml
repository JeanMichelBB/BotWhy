name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "frontend-react/**"
      - "backend-api/**"
      - ".github/workflows/docker-build.yaml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push frontend image
        run: |
          sed -i 's|http://localhost:8000|https://botwhyapi.sacenpapier.org|g' ./frontend-react/src/api.jsx
          docker buildx build --platform linux/amd64,linux/arm64 -t jeanmichelbb/oci-frontend:latest ./frontend-react --push

      - name: Build and push backend image
        run: |
          docker buildx build --platform linux/amd64,linux/arm64 -t jeanmichelbb/oci-backend:latest ./backend-api --push